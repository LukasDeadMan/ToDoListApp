services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FRONTEND_ORIGINS=http://localhost:3000,http://localhost:3001,http://host.docker.internal:3001
      - FLASK_APP=run.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app  # assim alterações locais refletem no container

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true  # melhora o hot reload no docker
    volumes:
      - ./frontend:/app
      - /app/node_modules         # impede que o bind apague node_modules do container
    depends_on:
      - backend

  frontend-e2e:
    build: ./frontend
    ports:
      - "3001:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://host.docker.internal:5000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  e2e:
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    environment:
      - PLAYWRIGHT_BASE_URL=http://host.docker.internal:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
      - frontend-e2e
    working_dir: /app
    command: sh -lc "npx wait-on http://host.docker.internal:3001 && npm run test:e2e"
